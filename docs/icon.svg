<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Refract">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- incoming white-ish beam -->
  <line x1="6" y1="60" x2="50" y2="60" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <!-- prism -->
  <polygon points="64,28 36,86 92,86" fill="url(#glass)" stroke="#6366f1" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- refracted spectrum -->
  <g stroke-width="5" stroke-linecap="round">
    <line x1="78" y1="60" x2="122" y2="40" stroke="#ef4444"/>
    <line x1="78" y1="60" x2="122" y2="52" stroke="#f97316"/>
    <line x1="78" y1="60" x2="122" y2="64" stroke="#eab308"/>
    <line x1="78" y1="60" x2="122" y2="76" stroke="#22c55e"/>
    <line x1="78" y1="60" x2="122" y2="88" stroke="#3b82f6"/>
    <line x1="78" y1="60" x2="122" y2="100" stroke="#8b5cf6"/>
  </g>
</svg>
