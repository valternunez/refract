<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Refract demo — intentionally broken</title>

    <!--
      FIXTURE: this page is broken ON PURPOSE. Each bug is responsive-specific
      (breaks on phones, fine on desktop) and maps to a planned v0.2 finding.
      Do NOT "fix" these — packages/core/src/demo-site.test.ts asserts they exist.

        #overflow-card  → horizontal_overflow   (fixed 480px; overflows ≤402px viewports)
        #tiny-btn       → tap_target_small       (28×24, under the 44×44 minimum)
        #clipped        → text_overflow          (nowrap + overflow:hidden, text cut off)
        #hero-img       → image_no_alt           (missing alt attribute)
        #live-badge     → (animation; --freeze should hold it still)
    -->
    <style>
      :root {
        --ink: #1f2937;
        --accent: #4f46e5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--ink);
        line-height: 1.5;
      }
      header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: var(--accent);
        color: #fff;
      }
      header h1 {
        font-size: 1.15rem;
        margin: 0;
      }
      #live-badge {
        margin-left: auto;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: #22c55e;
        font-size: 0.7rem;
        font-weight: 600;
        /* Animated so `--freeze` has something visible to stop. */
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.35;
          transform: scale(1.12);
        }
      }
      main {
        padding: 1.25rem;
      }
      /* Everything is responsive (max-width:100%) EXCEPT #overflow-card, so the
         horizontal overflow is attributable to that one element. */
      #hero-img {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }
      h2 {
        font-size: 1.4rem;
      }
      /* BUG: fixed 480px width → overflows phone viewports, fine on tablet/desktop. */
      #overflow-card {
        width: 480px;
        margin: 1rem 0;
        padding: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
      }
      #overflow-card table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      #overflow-card td {
        padding: 0.35rem 0.5rem;
        border-bottom: 1px solid #eee;
      }
      /* BUG: text clipped — no wrap, hidden overflow, no ellipsis. */
      #clipped {
        width: 220px;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        color: #6b7280;
        font-size: 0.85rem;
      }
      /* BUG: tap target far under the 44×44 minimum. */
      #tiny-btn {
        width: 28px;
        height: 24px;
        padding: 0;
        border: none;
        border-radius: 4px;
        background: var(--accent);
        color: #fff;
        font-size: 0.7rem;
        cursor: pointer;
      }
      .cta-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin: 1rem 0;
      }
      footer {
        padding: 1.25rem;
        color: #9ca3af;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Acme Dashboard</h1>
      <span id="live-badge">LIVE</span>
    </header>

    <main>
      <!-- BUG: image_no_alt — no `alt` attribute. (Inline SVG so it renders offline.) -->
      <img
        id="hero-img"
        src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='800'%20height='240'%3E%3Crect%20width='800'%20height='240'%20fill='%234f46e5'/%3E%3Ctext%20x='32'%20y='130'%20fill='white'%20font-family='sans-serif'%20font-size='34'%3EQuarterly%20Report%3C/text%3E%3C/svg%3E"
      />

      <h2>Welcome back</h2>

      <!-- BUG: text_overflow — long single line, clipped with no ellipsis. -->
      <p id="clipped">
        This sentence is far too long to fit and gets cut off without any ellipsis.
      </p>

      <!-- BUG: horizontal_overflow — fixed 480px card breaks the phone viewport. -->
      <section id="overflow-card">
        <table>
          <tr><td>Invoice</td><td>#10428</td><td>Status</td><td>Paid</td></tr>
          <tr><td>Customer</td><td>Globex Corporation</td><td>Amount</td><td>$4,280.00</td></tr>
          <tr><td>Issued</td><td>2026-06-01</td><td>Due</td><td>2026-06-30</td></tr>
        </table>
      </section>

      <div class="cta-row">
        <!-- BUG: tap_target_small — 28×24 button. -->
        <button id="tiny-btn" type="button">Go</button>
        <span>Confirm your subscription</span>
      </div>
    </main>

    <footer>Refract demo site — every bug here is intentional.</footer>
  </body>
</html>
