name: Release

# Armed: on push to main, Changesets opens a "Version Packages" PR that consumes the
# pending changesets (bumps versions + rewrites CHANGELOG). Merging that PR runs
# `changeset publish` to npm (with provenance). Requires the NPM_TOKEN repo secret and
# Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests".
# workflow_dispatch is kept so the release job can also be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Signed npm provenance (uses the id-token permission above).
          NPM_CONFIG_PROVENANCE: true
