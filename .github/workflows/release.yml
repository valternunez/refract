name: Release

# Manual-only until the first publish. To arm it: (1) add an NPM_TOKEN repo secret
# (npm Automation token), (2) enable Settings → Actions → General → "Allow GitHub
# Actions to create and approve pull requests", then (3) swap the trigger below for
# `push: { branches: [main] }`. Changesets then opens a "Version Packages" PR on
# push to main; merging it publishes to npm.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Signed npm provenance (uses the id-token permission above).
          NPM_CONFIG_PROVENANCE: true
