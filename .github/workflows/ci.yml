name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      # render() tests drive real headless browsers (Chromium + the WebKit engine).
      - run: pnpm --filter @getrefractjs/core exec playwright install --with-deps chromium webkit
      - run: pnpm test
